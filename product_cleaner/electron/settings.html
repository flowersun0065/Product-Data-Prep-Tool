<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置</title>
<link rel="stylesheet" href="/static/css/native.css">
<style>
  body { display: flex; padding: 0; gap: 0; height: 100vh; }
  /* Settings uses its own layout, not body flex */
  .settings-layout { display: flex; height: 100vh; width: 100%; }
  .settings-nav {
    width: 170px; padding: 24px 12px;
    border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column; gap: 2px;
    background: var(--panel);
  }
  .settings-nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; font-size: 12px; color: var(--text-sub);
    border-radius: var(--radius-sm); cursor: pointer;
    transition: all 0.12s;
  }
  .settings-nav-item:hover { background: var(--surface); color: var(--text-main); }
  .settings-nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 500; }
  .settings-content { flex: 1; padding: 28px 36px; overflow-y: auto; }
  .settings-hdr {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 32px;
  }
  .settings-hdr h2 { font-size: 16px; color: var(--text-main); margin: 0 0 2px 0; font-weight: 600; }
  .settings-hdr p  { font-size: 12px; color: var(--text-muted); margin: 0; }
  .settings-section { margin-bottom: 36px; }
  .settings-section h3 {
    font-size: 13px; font-weight: 600; color: var(--text-main);
    margin-bottom: 4px;
  }
  .settings-section > p {
    font-size: 11px; color: var(--text-muted); margin: 0 0 16px 0;
  }
  .settings-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border-light);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 12px; color: var(--text-main); font-weight: 500; }
  .settings-hint { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  select, input[type=text], input[type=password], input[type=number] {
    padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--panel); color: var(--text-main); font-size: 12px;
    font-family: var(--font); outline: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  kbd {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 7px; border-radius: 4px; font-size: 10px;
    font-family: var(--font-mono); color: var(--text-sub);
    box-shadow: 0 1px 0 var(--border);
  }
  .shortcut-table { width: 100%; border-collapse: collapse; }
  .shortcut-table td { padding: 6px 0; font-size: 12px; }
  .shortcut-table td:first-child { color: var(--text-sub); }
  .shortcut-table td:last-child { text-align: right; }
</style>
</head>
<body>
<div class="settings-layout">

  <nav class="settings-nav">
    <div class="settings-nav-item active" data-section="general" onclick="showSection('general')">通用</div>
    <div class="settings-nav-item" data-section="ai" onclick="showSection('ai')">AI 工作流</div>
    <div class="settings-nav-item" data-section="storage" onclick="showSection('storage')">数据 & 存储</div>
    <div class="settings-nav-item" data-section="appearance" onclick="showSection('appearance')">外观</div>
    <div class="settings-nav-item" data-section="shortcuts" onclick="showSection('shortcuts')">快捷键</div>
  </nav>

  <main class="settings-content">
    <div class="settings-hdr">
      <div>
        <h2>设置</h2>
        <p>管理应用行为、AI 配置、主题外观和本地存储。</p>
      </div>
    </div>
    <div id="settingsContent"></div>
  </main>

</div>
<script src="/electron/js/settings.js"></script>
</body>
</html>
