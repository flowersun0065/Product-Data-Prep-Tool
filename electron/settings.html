<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <link rel="stylesheet" href="../product_cleaner/static/css/native.css">
  <style>
    .settings-layout { display: flex; height: 100vh; }
    .settings-nav { width: 160px; background: var(--bg-secondary); border-right: 1px solid var(--border-primary); padding: 10px; }
    .settings-nav-item { padding: 6px 8px; border-radius: 4px; color: var(--text-secondary); font-size: 11px; cursor: pointer; margin-bottom: 2px; }
    .settings-nav-item.active { background: rgba(0,122,255,0.12); color: var(--text-primary); font-weight: 500; }
    .settings-content { flex: 1; padding: 20px; overflow-y: auto; }
    .settings-section { margin-bottom: 20px; }
    .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .settings-label { color: var(--text-primary); font-size: 11px; }
    .settings-hint { color: var(--text-quaternary); font-size: 9px; }
    .settings-nav-item:hover { background: var(--bg-tertiary); }
  </style>
</head>
<body>
  <div class="settings-layout">
    <div class="settings-nav">
      <div class="settings-nav-item active" data-section="general" onclick="showSection('general')">通用</div>
      <div class="settings-nav-item" data-section="ai" onclick="showSection('ai')">AI 配置</div>
      <div class="settings-nav-item" data-section="storage" onclick="showSection('storage')">数据 & 存储</div>
      <div class="settings-nav-item" data-section="appearance" onclick="showSection('appearance')">外观</div>
      <div class="settings-nav-item" data-section="shortcuts" onclick="showSection('shortcuts')">快捷键</div>
    </div>
    <div class="settings-content" id="settingsContent"></div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
